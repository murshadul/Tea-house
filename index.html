<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Manrope", sans-serif;
        }
    </style>
    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- Banner Section -->
    <section class="grid grid-cols-2 container border border-red-500 mx-auto gap-x-[12px]">
        <div class="banner-left">

            <h2 class="text-[80px] font-extrabold leading-[100px] text-[#1C1C1C]">It's good<br>
                tea time at The<br> Tea House</h2>
            <p class="text-[18px] text-[#777777]">Tea and Botanical Solutions Supplier Give Optimum <br>Satisfaction To
                Your
                Taste
                Buds.</p>
            <button
                class="font-bold text-[20px] rounded-md text-[#FFFFFF] bg-red-400 px-5 py-3 bg-linear-to-r from-[#FF0000] to-[#FF8938]">Explore
                More<span class="inline-block -rotate-45"><i class="fa-solid fa-arrow-right-long"></i></span></button>

        </div>
        <div class="banner-right">
            <img src="./images/banner.png" alt="">
        </div>
    </section>

</body>

</html>
